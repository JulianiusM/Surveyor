name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.3, 1.2.3-alpha.1, 1.2.3-rc.2)"
        required: true
        type: string

permissions:
  contents: write    # needed to push commits, tags and create releases

jobs:
  # 1) Full CI verification on the selected branch and commit
  ci:
    name: Run full CI on selected branch
    uses: ./.github/workflows/ci.yml   # reusable CI workflow
    secrets: inherit

  # 2) If CI passes, bump version, tag, build, and create release
  release:
    name: Bump version, tag, build & create release
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          # For workflow_dispatch, github.ref is refs/heads/<chosen-branch>
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate requested version and check tag availability
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -e

          echo "Requested release version: ${RELEASE_VERSION}"

          # Validate version with Node (must be semver-like: 1.2.3 or 1.2.3-alpha.1)
          node << 'EOF'
          const v = process.env.RELEASE_VERSION || '';

          const semverLike = /^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$/;

          if (!semverLike.test(v)) {
            console.error(`ERROR: Version '${v}' is not a valid semver (e.g. 1.2.3 or 1.2.3-alpha.1).`);
            process.exit(1);
          }

          if (/dev/i.test(v)) {
            console.error("ERROR: 'dev' is not allowed in release versions.");
            process.exit(1);
          }

          const prereleaseIndex = v.indexOf('-');
          if (prereleaseIndex !== -1) {
            const pre = v.slice(prereleaseIndex + 1); // e.g. "alpha.1"
            if (!/^(alpha|beta|rc)(\.|$)/.test(pre)) {
              console.error(`ERROR: Pre-release identifier must start with alpha, beta, or rc (got: '${pre}')`);
              process.exit(1);
            }
          }

          console.log(`Version '${v}' is syntactically valid.`);
          process.exit(0);
          EOF

          # Ensure tag v<version> does not already exist remotely
          git fetch --tags --quiet
          if git tag -l "v${RELEASE_VERSION}" | grep -q .; then
            echo "ERROR: Tag v${RELEASE_VERSION} already exists."
            exit 1
          fi

          echo "Tag 'v${RELEASE_VERSION}' is free."

      - name: Update package.json to requested version (no tag yet)
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -e
          echo "Updating package.json to version ${RELEASE_VERSION}..."
          npm version "${RELEASE_VERSION}" --no-git-tag-version

          echo "New package.json version:"
          node -p "require('./package.json').version"

      - name: Commit version bump and create tag
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage version changes
          if [ -f package-lock.json ]; then
            git add package.json package-lock.json
          else
            git add package.json
          fi

          if git diff --cached --quiet; then
            echo "No changes detected after version bump; aborting."
            exit 1
          fi

          git commit -m "chore: release v${RELEASE_VERSION}"

          # Create annotated tag
          git tag -a "v${RELEASE_VERSION}" -m "Release v${RELEASE_VERSION}"

          echo "Pushing commit and tag to origin..."
          git push origin HEAD
          git push origin "v${RELEASE_VERSION}"

      - name: Build application for release
        run: npm run build

      - name: Create build archive
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          set -e

          mkdir -p artifacts/tmp

          # Copy built files (flatten dist/) into a temp staging dir
          cp -R dist/* artifacts/tmp/

          # Optionally include package.json at the root of the archive
          cp package.json artifacts/tmp/

          # Create the tarball with everything from the staging dir at the root
          (
            cd artifacts/tmp
            tar -czf "../surveyor-v${RELEASE_VERSION}.tar.gz" .
          )

          # Clean up staging directory
          rm -rf artifacts/tmp

          echo "Created artifacts/surveyor-v${RELEASE_VERSION}.tar.gz with dist contents at archive root:"
          ls -R artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          # Any version with '-' (alpha/beta/rc/...) is treated as prerelease
          prerelease: ${{ contains(inputs.version, '-') }}
          files: |
            artifacts/surveyor-v${{ inputs.version }}.tar.gz
