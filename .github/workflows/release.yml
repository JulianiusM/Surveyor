name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    name: Run full CI for the tagged commit
    uses: JulianiusM/Surveyor/.github/workflows/ci.yml@ts-migrate
    secrets: inherit

  build-and-release:
    name: Build & package release
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Normalize release version (remove -dev suffix)
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); const orig=pkg.version; const base=orig.split('-')[0]; if(orig!==base && !base.startsWith("rc"){ console.log('Stripping prerelease suffix from version: ' + orig + ' -> ' + base); pkg.version=base; fs.writeFileSync('package.json', JSON.stringify(pkg,null,2) + '\n'); } else { console.log('No prerelease suffix to strip (version is ' + orig + ')'); }"

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          echo "package.json version (normalized): $PKG_VERSION"
          echo "Tag version:                      $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build application (release)
        run: npm run build

      - name: Create build archive
        run: |
          tar -czf surveyor-dist.tar.gz dist package.json
          ls -R

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: surveyor-dist
          path: surveyor-dist.tar.gz

  github-release:
    name: Create GitHub Release
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: surveyor-dist
          path: .

      - name: List downloaded files
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: surveyor-dist.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump-dev-version:
    name: Bump package.json version for next development cycle
    needs: github-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Bump version in package.json to next -dev
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          echo "Current version on default branch: $CURRENT"

          BASE=${CURRENT%%-*}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
          NEXT_PATCH=$((PATCH + 1))
          NEXT="${MAJOR}.${MINOR}.${NEXT_PATCH}-dev"

          echo "Next dev version: $NEXT"
          npm version "$NEXT" --no-git-tag-version
          echo "next_version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Commit and push new dev version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -f package-lock.json ]; then
            git add package.json package-lock.json
          else
            git add package.json
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit; skipping push."
            exit 0
          fi

          git commit -m "chore: bump version to ${{ steps.bump.outputs.next_version }} for next development cycle"
          git push origin HEAD:${{ github.event.repository.default_branch }}
